<!doctype html>
<html lang="en">

<head>
    <title>Hangman Game</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
       





    </header>
    <main class="container mt-5">

        <div id="word-display" class="text-center fs-2 mb-4">

        </div>
        <div class="text-center">
            <p>Attempts left: <span id="attempts">6</span></p>
            <p id="message" class="mb-3"></p>
            <p>Letters already guessed: <span id="guessed-letters"></span></p>
        </div>
        </div>
        <div class="col-md-6">
            <div id="hangman-drawing" class="hangman-drawing">
                <div class="gallows-top">
                        <img src="1.png" alt="Gallows Top" class="gallows-image">
                </div>
                <div class="head">
                        <img src="" alt="" class="-image">
                </div>
                <div class="body">
                        <img src="" alt="" class="-image">
                </div>
                <div class="left-arm">
                        <img src="" alt="" class="-image">
                </div>
                <div class="right-arm">
                        <img src="" alt="" class="-image">
                </div>
                <div class="left-leg">
                        <img src="" alt="" class="-image">
                </div>
                <div class="right-leg">
                        <img src="" alt="" class="-image">
                </div>
            </div>
        </div>
        </div>
        <div class="row mt-4">
            <div class="col-12 text-center">
                <h3>Guess a letter:</h3>
                <div class="d-flex justify-content-center gap-2 mt-3">
                    <input type="text" id="letter-input" class="form-control" style="max-width: 100px;"
                        placeholder="Enter letter" maxlength="1">
                    <button id="guess-btn" class="btn btn-primary">Guess</button>
                </div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-12 text-center">
                <button id="reset-btn" class="btn btn-secondary">Reset Game</button>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12 text-center">
           <button id="easy-btn" class="btn btn-success">Easy</button>
            <button id="medium-btn" class="btn btn-warning">Medium</button>
            <button id="hard-btn" class="btn btn-danger">Hard</button>
            </div>
        </div>

    </main>
    <footer>
        <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
    <script src=script.js></script>
</body>

</html>
